<!-- Public interface entry -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="metaTitle">صفحتي</title>
<meta name="description" id="metaDesc" content="الصفحة الرسمية لإبراهيم بن عبدالله الحربي">
<meta property="og:type" content="profile">
<meta property="og:title" id="ogTitle" content="صفحتي">
<meta property="og:description" id="ogDesc" content="الصفحة الرسمية لإبراهيم بن عبدالله الحربي">
<meta property="og:image" id="ogImage" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" id="twTitle" content="صفحتي">
<meta name="twitter:image" id="twImage" content="">
<meta name="theme-color" content="#2A5C1F">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="canonical" href="/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--sf:#ffffff;--sf2:#f7f7f8;
  --bd:rgba(15,23,42,.08);--bds:rgba(15,23,42,.16);
  --tx:#111111;--mt:#5f6368;--lt:#90959c;
  --ac:#111111;--al:#f1f1f1;--am:#3f3f46;
  --gd:#2f2f35;--gl:#f4f4f5;
  --r:20px;--rs:12px;
  --fw-r:400;--fw-m:500;--fw-sb:600;--fw-b:700;
  --sh:none;
  --shh:none;
  --fn:'Tajawal',sans-serif;--fs:'Tajawal',sans-serif;
}
body{font-family:var(--fn);font-weight:var(--fw-r);background:#fff;color:var(--tx);direction:rtl;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at top right,rgba(17,17,17,.018) 0,transparent 34%),radial-gradient(circle at bottom left,rgba(17,17,17,.012) 0,transparent 26%);pointer-events:none;z-index:0}

/* SKELETON */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.sk{background:linear-gradient(90deg,var(--sf2) 25%,rgba(255,255,255,.7) 50%,var(--sf2) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:8px}

/* WRAP */
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:32px 18px 90px}

/* SKELETON UI */
#skLoader{animation:none}
.sk-card{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);padding:32px 24px;text-align:center;margin-bottom:14px;box-shadow:var(--sh)}
.sk-av{width:88px;height:88px;border-radius:50%;margin:0 auto 16px}
.sk-line{height:13px;margin:0 auto 10px;border-radius:6px}
.sk-icons{display:flex;justify-content:center;gap:14px;background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);padding:20px;margin-bottom:12px}
.sk-ic{width:48px;height:48px;border-radius:10px}

/* MAIN */
#mainContent{display:none}

/* TOPBAR */
.topbar{display:none;align-items:center;justify-content:flex-end;gap:14px;margin-bottom:22px}
.brand-mark{display:flex;align-items:center;gap:10px}
.brand-dot{width:12px;height:12px;border-radius:50%;background:var(--tx);box-shadow:0 0 0 6px rgba(17,17,17,.08)}
.brand-copy{display:flex;flex-direction:column;gap:2px}
.brand-copy strong{font-size:14px;font-weight:700}
.brand-copy span{font-size:11px;color:var(--mt)}
.admin-trigger{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:999px;padding:10px 16px;color:var(--tx);font-family:var(--fn);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:var(--sh);text-decoration:none}
.admin-trigger:hover{transform:translateY(-1px);box-shadow:var(--shh)}
.admin-trigger svg{width:16px;height:16px;fill:currentColor}
.lang-row{display:none}

/* PROFILE CARD */
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.profile-card{position:relative;overflow:hidden;background:#fff;backdrop-filter:none;border-radius:30px;border:1px solid rgba(15,23,42,.08);padding:34px 26px 28px;text-align:center;margin-bottom:24px;box-shadow:0 10px 30px rgba(120,128,140,.07);animation:up .5s ease both}
.av-wrap{position:relative;width:124px;height:124px;margin:0 auto 18px}
.av-img{width:124px;height:124px;border-radius:50%;object-fit:cover;border:4px solid #fff;box-shadow:0 0 0 1px rgba(15,23,42,.06),0 10px 24px rgba(15,23,42,.12)}
.av-ph{width:124px;height:124px;border-radius:50%;background:#f1f1f3;border:4px solid #fff;box-shadow:0 0 0 1px rgba(15,23,42,.06),0 10px 24px rgba(15,23,42,.12);display:flex;align-items:center;justify-content:center}
.av-ph svg{width:42px;height:42px;fill:var(--ac);opacity:.35}
.vbadge{position:absolute;bottom:4px;left:6px;width:26px;height:26px;background:var(--ac);border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(15,23,42,.2)}
.vbadge svg{width:12px;height:12px;fill:#fff}
.p-name{font-family:var(--fn);font-size:28px;font-weight:var(--fw-b);line-height:1.25;margin-bottom:6px;letter-spacing:-.2px}
.p-title{font-size:14px;color:var(--am);font-weight:var(--fw-m);letter-spacing:.3px;margin-bottom:10px}

/* MOWTHOOQ BADGE */
.mw-badge{display:inline-flex;align-items:center;gap:7px;background:#f4f4f5;border:1px solid rgba(17,17,17,.08);border-radius:22px;padding:6px 14px;font-size:13px;color:var(--tx);font-weight:var(--fw-sb);margin:6px auto 0}
.mw-badge svg{width:15px;height:15px;fill:var(--tx)}

.p-bio{font-size:15px;color:var(--mt);line-height:1.85;max-width:390px;margin:0 auto 18px;font-weight:var(--fw-r)}
.vcounter{display:inline-flex;align-items:center;gap:7px;background:var(--gl);border:1px solid rgba(17,17,17,.08);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--gd);font-weight:var(--fw-b)}
.vdot{width:7px;height:7px;border-radius:50%;background:var(--gd);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.visitor-card{display:none;background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:24px;padding:16px 18px;box-shadow:0 4px 14px rgba(120,128,140,.05);margin-bottom:22px;text-align:center;animation:up .5s ease both}
.visitor-card .vcounter{background:transparent;border:none;padding:0}
.card-title-lite{font-family:var(--fn);font-size:14px;font-weight:var(--fw-b);color:var(--tx);margin-bottom:15px;text-align:right;display:flex;align-items:center;gap:9px}
.card-title-lite::before{content:'';flex:0 0 auto;width:4px;height:16px;border-radius:4px;background:var(--ac)}

/* SECTION LABEL */
.sec-lbl{font-size:11px;font-weight:var(--fw-b);letter-spacing:1.2px;text-transform:uppercase;color:var(--lt);margin:28px 0 12px 2px}

/* SOCIAL — grey square icons */
.social-card{background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:24px;padding:18px 20px;box-shadow:0 4px 14px rgba(120,128,140,.05);margin-bottom:22px;text-align:center;animation:up .5s ease both}
.social-icons-row{display:grid;grid-template-columns:repeat(4,64px);gap:10px;justify-content:center}
.si-btn{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;width:64px;transition:transform .2s;border:none;background:none;padding:0;text-decoration:none}
.si-btn:hover{transform:translateY(-2px)}
.si-box{width:52px;height:52px;border-radius:14px;background:var(--sf2);border:1px solid rgba(15,23,42,.08);display:flex;align-items:center;justify-content:center;transition:all .2s}
.si-btn:hover .si-box{border-color:rgba(15,23,42,.14);background:#fff;box-shadow:none}
.si-box svg{width:24px;height:24px;fill:#555}
.si-lbl{font-size:12px;font-weight:600;color:var(--mt);text-align:center}
#lblSocial{display:none}

.section-frame{background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:26px;padding:18px 20px;box-shadow:0 4px 14px rgba(120,128,140,.05);margin-bottom:22px;animation:up .5s ease both}
.section-frame .books-grid{margin-top:2px}
.section-frame .partner-row:last-child{margin-bottom:0}
#lblPartners{display:none}
#lblBooks{display:none}
#socialSec,#booksWrap,#partnersWrap,#collabWrap{margin-bottom:6px}

/* BOOKS */
.books-grid{display:grid;grid-template-columns:1fr;gap:14px}
.book-card{background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:22px;padding:14px;box-shadow:0 4px 14px rgba(120,128,140,.05);animation:up .5s ease both;transition:all .22s;display:grid;grid-template-columns:96px 1fr;gap:12px;align-items:start}
.book-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(120,128,140,.08)}
.book-cover-shell{padding:7px;border-radius:16px;background:linear-gradient(180deg,#fafafa,#f1f2f4);border:1px solid #d8dce2;box-shadow:0 6px 14px rgba(120,128,140,.08)}
.book-cover{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;border-radius:12px}
.book-cover-ph{width:100%;aspect-ratio:3/4;background:#f6f6f7;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-radius:12px}
.book-cover-ph svg{width:32px;height:32px;fill:var(--ac);opacity:.3}
.book-cover-ph span{font-size:11px;color:var(--lt)}
.book-info{padding:2px 0 0}
.book-title{font-size:15px;font-weight:var(--fw-b);line-height:1.6;margin-bottom:8px}
.book-meta{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.book-meta-item{display:flex;flex-wrap:wrap;gap:6px;font-size:12px;line-height:1.7}
.book-meta-label{color:var(--lt);font-weight:var(--fw-sb)}
.book-meta-value{color:var(--tx)}
.book-btns{display:flex;flex-wrap:wrap;justify-content:flex-start;gap:8px}
.bbtn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:auto;min-width:148px;max-width:190px;padding:11px 22px;border-radius:12px;font-size:12px;font-weight:600;font-family:var(--fn);text-decoration:none;cursor:pointer;border:none;transition:all .18s;white-space:nowrap}
.bbtn-p{background:var(--ac);color:#fff}.bbtn-p:hover{background:#2a2a2a}
.bbtn-d{background:#f1f3f5;color:var(--tx);border:1px solid rgba(15,23,42,.08)}.bbtn-d:hover{background:#e8ebef}
.bbtn svg{width:12px;height:12px;fill:currentColor;flex-shrink:0}

/* PARTNERS */
.partner-row{display:grid;grid-template-columns:58px minmax(0,1fr);align-items:start;gap:13px;background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:20px;padding:15px 16px;text-decoration:none;color:var(--tx);margin-bottom:10px;box-shadow:0 4px 14px rgba(120,128,140,.05);transition:all .22s;cursor:pointer;width:100%;font-family:var(--fn);text-align:right}
.partner-row:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(120,128,140,.07)}
.p-icon{width:42px;height:42px;border-radius:10px;background:var(--gl);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.p-icon svg{width:20px;height:20px;fill:var(--tx)}
.p-image{width:58px;height:58px;border-radius:13px;object-fit:cover;flex-shrink:0;border:1px solid rgba(15,23,42,.08);background:#f5f5f6}
.p-content{min-width:0;display:flex;flex-direction:column;align-items:flex-start}
.p-body{width:100%;min-width:0}
.partner-name{font-size:14px;font-weight:var(--fw-sb);margin-bottom:2px}
.p-desc{font-size:12px;color:var(--mt);line-height:1.75;overflow-wrap:anywhere}
.p-cta{display:inline-flex;align-items:center;justify-content:center;min-width:112px;margin-top:10px;background:var(--tx);color:#fff;font-size:12px;font-weight:600;font-family:var(--fn);padding:8px 14px;border-radius:999px;white-space:nowrap;box-shadow:0 8px 18px rgba(120,128,140,.08)}

/* COLLAB — refined premium card */
.collab-card{
  position:relative;
  overflow:hidden;
  background:#fff;
  border:1px solid rgba(15,23,42,.08);
  border-radius:30px;
  padding:30px 24px 24px;
  margin-bottom:22px;
  text-align:right;
  animation:up .5s ease both;
  box-shadow:0 4px 14px rgba(120,128,140,.05);
}
.collab-title{font-family:var(--fn);font-size:23px;font-weight:var(--fw-b);letter-spacing:-.2px;color:var(--tx);margin-bottom:8px;display:flex;align-items:center;gap:9px;justify-content:flex-start}
.collab-title::before{content:'';flex:0 0 auto;width:4px;height:18px;border-radius:4px;background:var(--ac)}
.collab-sub{font-size:13px;color:var(--mt);line-height:1.85;max-width:420px;margin:0 0 18px}
.collab-stats{display:flex;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.cstat{min-width:86px;padding:10px 12px;border-radius:18px;background:rgba(247,247,248,.92);border:1px solid rgba(15,23,42,.06);text-align:center}
.cstat-val{font-size:20px;font-weight:var(--fw-b);color:var(--tx);line-height:1.1}
.cstat-lbl{font-size:11px;color:var(--lt);margin-top:4px}
.cstat-div{width:1px;background:var(--bd);align-self:stretch}
.collab-note{background:var(--sf2);border:1px solid var(--bd);border-radius:18px;padding:12px 14px;font-size:12px;line-height:1.8;color:var(--mt);margin-bottom:18px}
.collab-entry-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  background:#111;
  color:#fff;
  padding:14px 28px;
  border-radius:16px;
  font-family:var(--fn);
  font-size:15px;
  font-weight:var(--fw-sb);
  text-decoration:none;
  cursor:pointer;
  border:1px solid #d6d9de;
  transition:all .2s;
  width:fit-content;
  min-width:170px;
  max-width:340px;
  margin-inline:auto;
  box-shadow:0 10px 24px rgba(17,17,17,.16);
}
.collab-entry-btn:hover{background:#27272a;border-color:#27272a;transform:translateY(-2px);box-shadow:0 14px 30px rgba(17,17,17,.2)}
.collab-entry-btn svg{width:19px;height:19px;fill:#fff;flex-shrink:0;opacity:1}
.collab-title + .collab-entry-btn{margin-top:22px}

/* ADVERT CARDS */
.advert-card{
  position:relative;
  overflow:hidden;
  background:#fff;
  border:1px solid rgba(15,23,42,.08);
  border-radius:26px;
  padding:18px 18px 16px;
  margin-bottom:14px;
  box-shadow:0 4px 14px rgba(120,128,140,.05);
}
.advert-hdr{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.advert-title{
  flex:1;
  font-size:16px;
  font-weight:700;
  line-height:1.55;
  color:var(--tx);
}
.advert-badge-on,.advert-badge-rem{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  white-space:nowrap;
  flex-shrink:0;
}
.advert-badge-on{background:rgba(17,17,17,.06);color:var(--tx);border:1px solid rgba(17,17,17,.08)}
.advert-badge-rem{background:var(--sf2);color:var(--mt);border:1px solid var(--bd)}
.advert-body{display:flex;flex-direction:column;gap:14px}
.advert-feats{display:grid;gap:8px}
.advert-feat{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--mt);line-height:1.7}
.feat-dot{width:6px;height:6px;border-radius:50%;background:var(--tx);flex-shrink:0;margin-top:7px;opacity:.8}
.advert-footer{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  padding-top:12px;
  margin-top:4px;
  border-top:1px solid var(--bd);
}
.advert-price-cur{display:block;font-size:11px;color:var(--lt);margin-bottom:2px}
.advert-price-val{font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--tx)}
.advert-price-note{font-size:11px;color:var(--lt);margin-top:4px;line-height:1.6;max-width:240px}
.advert-wa-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-width:150px;
  background:var(--tx);
  color:#fff;
  padding:12px 16px;
  border-radius:999px;
  font-family:var(--fn);
  font-size:13px;
  font-weight:700;
  text-decoration:none;
  border:none;
  transition:all .2s;
  white-space:nowrap;
  box-shadow:0 4px 14px rgba(120,128,140,.05);
}
.advert-wa-btn:hover{background:#2d2d2d;transform:translateY(-1px)}
.advert-wa-btn svg{width:16px;height:16px;fill:#fff;flex-shrink:0}

/* ADVERT CARDS */
.offer-modal{position:fixed;inset:0;background:rgba(17,17,17,.48);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:18px;z-index:60}
.offer-modal.open{display:flex}
.offer-shell{width:min(720px,100%);max-height:calc(100vh - 36px);background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:24px;box-shadow:0 8px 22px rgba(120,128,140,.05);overflow:hidden;display:flex;flex-direction:column}
.offer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid var(--bd);background:#fcfcfc}
.offer-head>div{min-width:0}
.offer-head h3{font-family:var(--fn);font-size:20px;font-weight:var(--fw-b)}
.offer-head p{font-size:12px;color:var(--mt);margin-top:4px;line-height:1.7;overflow-wrap:anywhere}
.offer-close{border:none;background:#f1f1f1;color:var(--tx);width:42px;height:42px;border-radius:14px;cursor:pointer;font-size:20px;line-height:1;flex-shrink:0}
.offer-body{padding:20px;overflow:auto}
.offer-step{display:none}
.offer-step.open{display:block}
.offer-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.offer-plan{background:#fff;border:1px solid var(--bd);border-radius:26px;padding:18px;box-shadow:0 4px 14px rgba(120,128,140,.05);display:flex;flex-direction:column;min-height:100%}
.offer-plan.featured{border-color:#111;background:#fff;box-shadow:0 6px 18px rgba(120,128,140,.07)}
.offer-plan-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.offer-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:var(--sf2);border:1px solid var(--bd);font-size:11px;font-weight:var(--fw-b);color:var(--tx)}
.offer-badge.featured{background:#111;color:#fff;border-color:#111}
.offer-plan h4{font-family:var(--fn);font-size:18px;font-weight:var(--fw-b);line-height:1.4;margin-bottom:6px}
.offer-plan-desc{font-size:12px;line-height:1.8;color:var(--mt);margin-bottom:14px;min-height:44px}
.offer-price{margin-bottom:14px}
.offer-price strong{font-size:32px;font-weight:var(--fw-b);color:var(--tx)}
.offer-price span{font-size:13px;color:var(--mt);margin-right:4px}
.offer-price-note{font-size:11px;color:var(--lt);margin-top:4px;line-height:1.6}
.offer-feats{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;flex:1}
.offer-feat{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--mt);line-height:1.7}
.offer-feat-dot{width:6px;height:6px;border-radius:50%;background:#111;flex-shrink:0;margin-top:7px}
.offer-select-btn{width:100%;border:1px solid #d6d9de;border-radius:14px;background:#fff;color:var(--tx);padding:10px 14px;font-family:var(--fn);font-size:13px;font-weight:var(--fw-sb);cursor:pointer;transition:all .2s}
.offer-select-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(120,128,140,.06);background:#fff;border-color:#cfd4da}
.offer-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.offer-form{max-width:480px;margin:0 auto}
.offer-back{display:inline-flex;align-items:center;gap:8px;border:none;background:none;color:var(--mt);font-family:var(--fn);font-size:13px;font-weight:var(--fw-sb);cursor:pointer;margin-bottom:14px}
.offer-picked{background:var(--sf2);border:1px solid var(--bd);border-radius:20px;padding:14px 16px;margin-bottom:16px}
.offer-picked strong{display:block;font-size:16px;margin-bottom:4px}
.offer-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.offer-field{margin-bottom:12px}
.offer-field label{display:block;font-size:12px;font-weight:var(--fw-sb);margin-bottom:6px;color:var(--tx)}
.req-star{color:#b42318;margin-inline-start:3px;font-weight:700}
.offer-field input,.offer-field textarea{width:100%;border:1px solid var(--bds);border-radius:14px;padding:13px 14px;font-family:var(--fn);font-size:14px;background:#fff;color:var(--tx);outline:none}

function normalizeAdLink(item){
  return {
    id:item.id||('link_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5)),
    titleAr:item.titleAr||item.nameAr||'',
    titleEn:item.titleEn||item.nameEn||item.titleAr||item.nameAr||'',
    entityAr:item.entityAr||item.descAr||'',
    entityEn:item.entityEn||item.descEn||item.entityAr||item.descAr||'',
    licenseNo:item.licenseNo||'',
    url:item.url||'',

    startDate:item.startDate||'',
    endDate:item.endDate||'',
    autoStop:!!item.autoStop,
    active:item.active!==false,
    archived:!!item.archived
  };
}

function bookLinksFor(item){
  const current=Array.isArray(item?.links)?item.links.filter(link=>link&&String(link.url||'').trim()).map((link,index)=>({id:String(link.id||('link_'+index)),label:String(link.label||'شراء').trim()||'شراء',url:String(link.url||'').trim()})):[];

  const legacy=[];
  if(item?.printUrl)legacy.push({id:'legacy_print',label:'شراء',url:String(item.printUrl).trim()});
  if(item?.digitalUrl)legacy.push({id:'legacy_digital',label:legacy.length?'رابط إضافي':'شراء',url:String(item.digitalUrl).trim()});
  return legacy;
}

  ensureSocialDefaults();
}

function mergeRemoteData(localData,remoteData){
  const local=localData&&typeof localData==='object'?localData:{};
  const remote=remoteData&&typeof remoteData==='object'?remoteData:{};
  const merged={...local,...remote};
  if(local.avatar&&!remote.avatar)merged.avatar=local.avatar;
  // Empty remote arrays are authoritative: they mean the administrator deleted all items.
  // Never resurrect deleted content from the visitor's local cache.
  if(Object.prototype.hasOwnProperty.call(remote,'adLinks'))delete merged.partners;
  if(local.sectionsOff||remote.sectionsOff)merged.sectionsOff={...(local.sectionsOff||{}),...(remote.sectionsOff||{})};
  if(local.collab||remote.collab)merged.collab={...(local.collab||{}),...(remote.collab||{})};
  return merged;
}

function ensureSocialDefaults(){
  if(!Array.isArray(D.social))D.social=[];
  let changed=false;
  const existing=new Set(D.social.map(item=>item.platform||'other'));
  DEFAULT_SOCIAL_PLATFORMS.forEach(platform=>{
    if(existing.has(platform))return;
    D.social.push({id:platform,platform,url:'',handle:'',active:true});
    changed=true;
  });
  D.social.forEach(item=>{
    if(item.active===undefined)item.active=true;
    if(item.url===undefined)item.url='';
    if(item.handle===undefined)item.handle='';
    if((item.platform||'other')==='other'){
      const label=String(item.handle||item.label||'').toLowerCase();
      if(label.includes('واتساب')||label.includes('whatsapp'))item.platform='whatsapp';
      else if(label.includes('فيس')||label.includes('facebook'))item.platform='facebook';
    }
    if(!item.platform)item.platform='other';
  });
  return changed;
}

  document.getElementById('twTitle').content='صفحتي';

  document.getElementById('ogDesc').content='الصفحة الرسمية لإبراهيم بن عبدالله الحربي';
  if(D.avatar){document.getElementById('ogImage').content=D.avatar;document.getElementById('twImage').content=D.avatar;}

  // Profile
  document.getElementById('pName').textContent=name||'إبراهيم بن عبدالله الحربي';

  // Mowthooq
  if(D.mowthooqNum){
    document.getElementById('mwBadge').style.display='inline-flex';
    document.getElementById('mwText').textContent='موثوق — '+D.mowthooqNum;
  }

  renderSocial();renderBooks();renderPartners();renderCollab();

  document.getElementById('skLoader').style.display='none';
  document.getElementById('mainContent').style.display='block';
  try{
    const response=await fetch(`${SB_URL}/functions/v1/public-content`,{
      method:'GET',
      headers:{apikey:SB_ANON_KEY,Authorization:`Bearer ${SB_ANON_KEY}`},
      cache:'no-store'
    });
    if(!response.ok)throw new Error('public-content-unavailable');
    const payload=await response.json();
    if(payload?.data)applyPublicData(payload.data);
  }catch(e){
    console.warn('Public content unavailable; using the last cached version.');
  }
  updateVisitorCounter();
  startPublicRealtime();
}

function applyPublicData(nextData){
  if(nextData&&typeof nextData==='object'){
    publicDataSignature=JSON.stringify(nextData);
    D=mergeRemoteData(D,nextData);
    normalizeData();
    localStorage.setItem('influencer_data',JSON.stringify(D));
  }
  const name=D.nameAr||'';
  const bio=D.bioAr||'';
  document.getElementById('metaTitle').textContent='صفحتي';
  document.getElementById('ogTitle').content='صفحتي';
  document.getElementById('twTitle').content='صفحتي';
  document.getElementById('metaDesc').content='الصفحة الرسمية لإبراهيم بن عبدالله الحربي';
  document.getElementById('ogDesc').content='الصفحة الرسمية لإبراهيم بن عبدالله الحربي';
  if(D.avatar){
    document.getElementById('ogImage').content=D.avatar;
    document.getElementById('twImage').content=D.avatar;
    document.getElementById('avImg').src=D.avatar;
    document.getElementById('avImg').style.display='block';
    document.getElementById('avPh').style.display='none';
  }
  document.getElementById('pName').textContent=name||'إبراهيم بن عبدالله الحربي';
  document.getElementById('pTitle').textContent=D.titleAr||'';
  document.getElementById('pBio').textContent=bio;
  const mwBadge=document.getElementById('mwBadge');
  const mwText=document.getElementById('mwText');
  if(D.mowthooqNum){
    if(mwBadge)mwBadge.style.display='inline-flex';
    if(mwText)mwText.textContent='\u0645\u0648\u062b\u0648\u0642 - '+D.mowthooqNum;
  }else if(mwBadge){
    mwBadge.style.display='none';
  }
  renderSocial();
  renderBooks();
  renderPartners();
  renderCollab();
}

async function refreshPublicData(){
  if(publicDataIsRefreshing)return;
  publicDataIsRefreshing=true;
  try{
    const response=await fetch(SB_URL+'/functions/v1/public-content',{
      method:'GET',
      headers:{apikey:SB_ANON_KEY,Authorization:'Bearer '+SB_ANON_KEY},
      cache:'no-store'
    });
    if(!response.ok)throw new Error('public-content-unavailable');
    const payload=await response.json();
    if(payload?.data&&JSON.stringify(payload.data)!==publicDataSignature)applyPublicData(payload.data);
  }catch(e){
    console.warn('Public data refresh failed',e);
  }finally{
    publicDataIsRefreshing=false;
  }
}

function schedulePublicDataRefresh(){
  if(publicDataRefreshTimer)clearTimeout(publicDataRefreshTimer);
  publicDataRefreshTimer=setTimeout(refreshPublicData,250);
}

function startPublicDataPolling(){
  if(publicDataPollingTimer)clearInterval(publicDataPollingTimer);
  publicDataPollingTimer=setInterval(()=>{
    if(!document.hidden)schedulePublicDataRefresh();
  },PUBLIC_DATA_POLL_INTERVAL_MS);
}

function startPublicRealtime(){
  // Public content is cacheable and does not require one persistent WebSocket per visitor.
  startPublicDataPolling();
}

async function updateVisitorCounter(){
  let currentCount=parseInt(localStorage.getItem(LAST_VISITOR_COUNT_KEY)||'0',10)||0;
  try{
    if(!sb)throw new Error('Supabase is not available');
    if(sessionStorage.getItem(VISITOR_SESSION_KEY)!=='1'){
      const {data,error}=await sb.functions.invoke('public-events',{body:{type:'visit',payload:{}}});
      if(!error&&data?.ok){currentCount=Number(data.count||currentCount);sessionStorage.setItem(VISITOR_SESSION_KEY,'1');}
      else if(data?.error==='rate_limited'||error?.context?.status===429){sessionStorage.setItem(VISITOR_SESSION_KEY,'1');}
    }
    if(!currentCount){const {data:row,error}=await sb.from('visitors').select('count').eq('id','counter').single();if(error)throw error;currentCount=Number(row?.count||0);}
    localStorage.setItem(LAST_VISITOR_COUNT_KEY,String(currentCount));
  }catch(e){
    if(sessionStorage.getItem(VISITOR_SESSION_KEY)!=='1')sessionStorage.setItem(VISITOR_SESSION_KEY,'1');
  }
}
function getActiveSessionId(){
  let id=sessionStorage.getItem(ACTIVE_SESSION_KEY);
  if(!id){
    const seed=(crypto?.randomUUID?.()||(`${Date.now()}_${Math.random().toString(36).slice(2)}`));
    id=`active_${seed}`;
    sessionStorage.setItem(ACTIVE_SESSION_KEY,id);
  }
  return id;
}

function setActiveVisitorDisplay(count){
  const countEl=document.getElementById('vCount');
  const labelEl=document.getElementById('vLbl');
  if(countEl)countEl.textContent=(count||0).toLocaleString('ar-SA');
  if(labelEl)labelEl.textContent='متواجد الآن';
}

async function cleanupActiveVisitorSessions(){
  if(!sb)return;
  const staleBefore=new Date(Date.now()-ACTIVE_VISITOR_CLEANUP_MS).toISOString();
  try{await sb.from('active_sessions').delete().lt('last_seen',staleBefore);}catch(e){}
}

async function updateActiveVisitorCounter(){
  const sessionId=getActiveSessionId();
  if(!sb){
    setActiveVisitorDisplay(1);
    return;
  }
  const now=new Date().toISOString();
  const activeSince=new Date(Date.now()-ACTIVE_VISITOR_CLEANUP_MS).toISOString();
  try{
    await sb.from('active_sessions').upsert({
      session_id:sessionId,
      last_seen:now,
      user_agent:navigator.userAgent.slice(0,240)
    },{onConflict:'session_id'});
    const {count,error}=await sb
      .from('active_sessions')
      .select('session_id',{count:'exact',head:true})
      .gte('last_seen',activeSince);
    if(error)throw error;
    setActiveVisitorDisplay(count||1);
  }catch(e){
    setActiveVisitorDisplay(1);
  }
}

function startActiveVisitorTracking(){
  setActiveVisitorDisplay(1);
  updateActiveVisitorCounter();
  cleanupActiveVisitorSessions();
  if(activeVisitorHeartbeatTimer)clearInterval(activeVisitorHeartbeatTimer);
  if(activeVisitorCleanupTimer)clearInterval(activeVisitorCleanupTimer);
  activeVisitorHeartbeatTimer=setInterval(updateActiveVisitorCounter,ACTIVE_VISITOR_HEARTBEAT_MS);
  activeVisitorCleanupTimer=setInterval(cleanupActiveVisitorSessions,ACTIVE_VISITOR_CLEANUP_MS);
}

function escapeHtml(value){
  return String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
}
function safeHttpUrl(value){
  try{const url=new URL(String(value||''));return ['http:','https:'].includes(url.protocol)?url.href:'';}catch(e){return '';}
}
function safeImageSrc(value){
  const raw=String(value||'');
  if(/^data:image\/(png|jpeg|webp);base64,/i.test(raw))return raw;
  return safeHttpUrl(raw);
}
function jsValue(value){return JSON.stringify(String(value??'')).replace(/</g,'\\u003c');}

function renderSocial(){
  const sec=document.getElementById('socialSec');
  const items=(D.social||[]).filter(s=>s.active!==false&&safeHttpUrl(s.url));
  if(!items.length){sec.innerHTML=`<div class="empty">ستظهر أيقونات التواصل هنا</div>`;return;}
  sec.innerHTML=`<div class="social-card"><div class="card-title-lite">تابعني على</div><div class="social-icons-row">${
    items.map(s=>{
      const m=getSocialMeta(s);
      const lbl=m.ar;
      const url=safeHttpUrl(s.url);
      return `<a class="si-btn" href="${escapeHtml(url)}" target="_blank" rel="noopener" data-track-id="${escapeHtml(s.id)}" title="${escapeHtml(lbl)}">
        <div class="si-box"><svg viewBox="0 0 24 24"><path d="${m.path}"/></svg></div>
        <span class="si-lbl">${lbl}</span>
      </a>`;
    }).join('')
  }</div></div>`;
}

function getActiveOffers(){
  const now=new Date();
  return (D.collab?.plans||[]).filter(p=>{
    if(!p.active)return false;
    if(p.startDate&&new Date(p.startDate)>now)return false;
    if(p.endDate&&new Date(p.endDate)<now)return false;
    return true;
  });
}

function renderCollab(){
  const wrap=document.getElementById('collabWrap');
  const sec=document.getElementById('collabSec');
  wrap.style.display='block';
  const collab=D.collab||{};
  const title=escapeHtml(collab.heroTitleAr||'للإعلان');
  const sub=escapeHtml(collab.heroSubAr||'');
  const fl=escapeHtml(collab.followers||'');

function showOfferStep(id){
  ['offerCatalogStep','offerFormStep','offerSuccessStep'].forEach(stepId=>{
    document.getElementById(stepId).classList.toggle('open',stepId===id);
  });
}

function openOfferFlow(){
  selectedOfferId=null;
  renderOfferRequestForm();
  document.getElementById('offerModal').classList.add('open');
  document.getElementById('offerModal').setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  requestAnimationFrame(()=>document.querySelector('.offer-body')?.scrollTo({top:0,behavior:'auto'}));
}

function closeOfferFlow(){
  document.getElementById('offerModal').classList.remove('open');
  document.getElementById('offerModal').setAttribute('aria-hidden','true');
  document.body.style.overflow='';
}

function platformAlert(message,title='تنبيه'){
  const modal=document.getElementById('platformAlert');
  const titleEl=document.getElementById('platformAlertTitle');
  const msgEl=document.getElementById('platformAlertMessage');
  if(!modal||!titleEl||!msgEl)return;
  titleEl.textContent=title;
  msgEl.textContent=message;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden','false');
}

function closePlatformAlert(){
  const modal=document.getElementById('platformAlert');
  if(!modal)return;
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden','true');
}

function showOfferError(message){
  const err=document.getElementById('offerSubmitError');
  if(err){err.textContent=message;err.style.display='block';return;}
  platformAlert(message,'إكمال البيانات');
}

function saveOfferEditState(data,form){if(!data?.requestId||!data?.editToken||!data?.editableUntil)return;localStorage.setItem(OFFER_EDIT_STORAGE_KEY,JSON.stringify({requestId:data.requestId,requestNo:data.requestNo||'',editToken:data.editToken,editableUntil:data.editableUntil,form}));}
function getOfferFormPayload(){const offer=getActiveOffers().find(p=>p.id===selectedOfferId);const name=document.getElementById('offerNameInput').value.trim();const phone=document.getElementById('offerPhoneInput').value.trim();const company=document.getElementById('offerCompanyInput').value.trim();const product=document.getElementById('offerProductInput')?.value.trim()||'';const platforms=[...document.querySelectorAll('input[name="offerPlatforms"]:checked')].map(i=>i.value);const notes=document.getElementById('offerNotesInput').value.trim();const form={planId:offer?.id||'',planTitle:offer?.titleAr||OFFER_AR.defaultPlan,name,phone,company,product,platforms,notes};return {offer,name,phone,company,product,platforms,notes,form};}
function hydrateOfferEditForm(editState,savedForm){if(!editState)return;const form=document.querySelector('#offerFormStep .offer-form');if(form){const notice=document.createElement('div');notice.className='offer-edit-notice';const strong=document.createElement('strong');strong.textContent=OFFER_AR.editTitle;const span=document.createElement('span');span.textContent=OFFER_AR.receivedNo+(editState.requestNo||'')+'. '+OFFER_AR.editDuring+offerRemainingText(editState.editableUntil)+OFFER_AR.newAfter;notice.append(strong,span);form.prepend(notice);}const setVal=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val||'';};setVal('offerNameInput',savedForm.name);setVal('offerPhoneInput',savedForm.phone);setVal('offerCompanyInput',savedForm.company);setVal('offerProductInput',savedForm.product);setVal('offerNotesInput',savedForm.notes);const selected=Array.isArray(savedForm.platforms)?savedForm.platforms:[];document.querySelectorAll('input[name="offerPlatforms"]').forEach(input=>{input.checked=selected.includes(input.value);});const consent=document.getElementById('offerConsentInput');if(consent)consent.checked=true;const btn=document.getElementById('offerSubmitBtn');if(btn)btn.textContent=OFFER_AR.saveEdit;}
function openOfferEditFromSuccess(){const state=parseOfferEditState();renderOfferRequestForm(state?.form?.planId||'');}

    <div class="offer-form-grid">
      <div class="offer-field">
        <label>الاسم <span class="req-star">*</span></label>
        <input id="offerNameInput" placeholder="الاسم الكامل">
      </div>
      <div class="offer-field">
        <label>رقم الجوال <span class="req-star">*</span></label>
        <input id="offerPhoneInput" placeholder="05xxxxxxxx" dir="ltr" inputmode="tel">
      </div>
    </div>
    <div class="offer-field">
      <label>الجهة / الشركة <span class="req-star">*</span></label>
      <input id="offerCompanyInput" placeholder="اسم الجهة أو الشركة">
    </div>
    <div class="offer-field">
      <label>منتج الإعلان <span class="req-star">*</span></label>
      <input id="offerProductInput" placeholder="ما المنتج أو الخدمة التي سيتم الإعلان عنها؟">
    </div>
    <div class="offer-field">
      <label>المنصات المطلوب الإعلان فيها <span class="req-star">*</span></label>
      <div class="platform-checks">
        <label class="platform-check"><span>تيك توك</span><input type="checkbox" name="offerPlatforms" value="تيك توك"><span class="platform-mark"><svg viewBox="0 0 24 24"><path d="M5 12.5 10 17l9-10"/></svg></span></label>
        <label class="platform-check"><span>سناب</span><input type="checkbox" name="offerPlatforms" value="سناب"><span class="platform-mark"><svg viewBox="0 0 24 24"><path d="M5 12.5 10 17l9-10"/></svg></span></label>
        <label class="platform-check"><span>انستغرام</span><input type="checkbox" name="offerPlatforms" value="انستغرام"><span class="platform-mark"><svg viewBox="0 0 24 24"><path d="M5 12.5 10 17l9-10"/></svg></span></label>
      </div>
    </div>
    <div class="offer-field">
      <label>تفاصيل الطلب <span class="req-star">*</span></label>
      <textarea id="offerNotesInput" placeholder="اكتب تفاصيل الإعلان المطلوبة، الرسالة، المدة، وأي معلومات مهمة للمراجعة."></textarea>
    </div>
    <label class="offer-consent" for="offerConsentInput">
      <input id="offerConsentInput" type="checkbox" class="offer-consent-box">
      <span class="offer-consent-check" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 12.5 10 17l9-10"/></svg></span>
      <span class="offer-consent-text">أوافق على <a href="privacy.html" target="_blank" rel="noopener">سياسة الخصوصية</a> و<a href="terms.html" target="_blank" rel="noopener">الشروط والأحكام</a>، وأقر بصحة المعلومات المقدمة.</span>
    </label>
    <div class="offer-error" id="offerSubmitError"></div>
    <button class="offer-submit" id="offerSubmitBtn" type="button" onclick="submitOfferRequest()">إرسال طلب الإعلان</button>
  </div>`;
  hydrateOfferEditForm(editState,savedForm);
  showOfferStep('offerFormStep');
}

function renderOfferCatalog(){
  const items=getActiveOffers();
  const step=document.getElementById('offerCatalogStep');
  if(!items.length){
    step.innerHTML=`<div class="empty">لا توجد باقات متاحة حالياً. يرجى المحاولة لاحقًا.</div>`;
    showOfferStep('offerCatalogStep');
    return;
  }
  step.innerHTML=`<div class="offer-grid">${items.map(p=>{
    const feats=(p.featsAr||'').split('\n').filter(f=>f.trim());
    const typeLabel=p.type==='onsite'?'حضوري':'عن بُعد';
    return `<article class="offer-plan${p.featured?' featured':''}">
      <div class="offer-plan-top">
        <div class="offer-badge${p.featured?' featured':''}">${p.featured?'الأكثر طلبًا':typeLabel}</div>
        ${p.price?`<div class="offer-badge">${p.price} ريال</div>`:''}
      </div>
      <h4>${p.titleAr||''}</h4>
      <div class="offer-plan-desc">${p.descAr||'باقة جاهزة لعرض التعاون بشكل احترافي ومباشر.'}</div>
      ${p.priceNoteAr?`<div class="offer-price-note">${p.priceNoteAr}</div>`:''}
      ${feats.length?`<div class="offer-feats">${feats.map(f=>`<div class="offer-feat"><div class="offer-feat-dot"></div><span>${f}</span></div>`).join('')}</div>`:''}
      <button class="offer-select-btn" type="button" onclick="selectOffer('${p.id}')">اختيار هذه الباقة</button>
    </article>`;
  }).join('')}</div>`;
  showOfferStep('offerCatalogStep');
}

function selectOffer(id){
  renderOfferRequestForm(id);
  return;
  const offer=getActiveOffers().find(p=>p.id===id);
  if(!offer)return;
  document.getElementById('offerFormStep').innerHTML=`<div class="offer-form">
    <button class="offer-back" type="button" onclick="renderOfferCatalog()">العودة إلى الباقات</button>
    <div class="offer-picked">
      <strong>${offer.titleAr||''}</strong>
      <span>${offer.price?offer.price+' ريال':'السعر يحدد بعد المراجعة'}${offer.priceNoteAr?` • ${offer.priceNoteAr}`:''}</span>
    </div>
    <div class="offer-form-grid">
      <div class="offer-field">
        <label>الاسم</label>
        <input id="offerNameInput" placeholder="الاسم الكامل">
      </div>
      <div class="offer-field">
        <label>رقم الجوال</label>
        <input id="offerPhoneInput" placeholder="05xxxxxxxx" dir="ltr">
      </div>
    </div>
    <div class="offer-form-grid">
      <div class="offer-field">
        <label>الجهة أو الشركة</label>
        <input id="offerCompanyInput" placeholder="اسم الجهة أو النشاط">
      </div>
      <div class="offer-field">
        <label>الباقة المختارة</label>
        <input value="${offer.titleAr||''}" disabled>
      </div>
    </div>
    <div class="offer-field">
      <label>ملاحظات مختصرة</label>
      <textarea id="offerNotesInput" placeholder="اذكر الهدف من الطلب أو المدة المتوقعة أو أي ملاحظة مهمة."></textarea>
    </div>
    <button class="offer-submit" type="button" onclick="submitOfferRequest()">إرسال الطلب</button>
  </div>`;
  showOfferStep('offerFormStep');
}

async function submitOfferRequest(){
  const err=document.getElementById('offerSubmitError');
  const submitBtn=document.getElementById('offerSubmitBtn');
  if(err){err.style.display='none';err.textContent='';}
  const editState=parseOfferEditState();
  const {name,phone,company,product,platforms,notes,form}=getOfferFormPayload();
  if(!name||!phone||!company||!product||!notes){showOfferError(OFFER_AR.missing);return;}
  if(!platforms.length){showOfferError(OFFER_AR.platformMissing);return;}
  if(!document.getElementById('offerConsentInput')?.checked){showOfferError(OFFER_AR.consentMissing);return;}
  let assignedRequestNo=editState?.requestNo||('AB-'+Date.now().toString(36).toUpperCase());
  let savedRemote=false;
  if(submitBtn){submitBtn.disabled=true;submitBtn.textContent=editState?OFFER_AR.saving:OFFER_AR.sending;}
  if(sb){try{const dbReq={plan_id:form.planId,plan_title:form.planTitle,name,phone,company,product,platforms:platforms.join(OFFER_AR.comma),notes,consent:true,legal_acknowledgement:true};if(editState){dbReq.request_id=editState.requestId;dbReq.edit_token=editState.editToken;}const {data,error}=await sb.functions.invoke('public-events',{body:{type:editState?'collab_request_update':'collab_request',payload:dbReq}});if(!error&&data?.ok){savedRemote=true;if(data.requestNo)assignedRequestNo=data.requestNo;if(editState)localStorage.removeItem(OFFER_EDIT_STORAGE_KEY);else saveOfferEditState({...data,requestNo:assignedRequestNo},form);}else if(data?.error==='request_recently_received'||error?.context?.status===429){showOfferError(requestRetryText(data?.retryAfterSeconds));if(submitBtn){submitBtn.disabled=false;submitBtn.textContent=editState?OFFER_AR.saveEdit:OFFER_AR.sendRequest;}return;}else if(data?.error==='edit_window_closed'||error?.context?.status===403){localStorage.removeItem(OFFER_EDIT_STORAGE_KEY);showOfferError(OFFER_AR.editExpired);if(submitBtn){submitBtn.disabled=false;submitBtn.textContent=OFFER_AR.sendRequest;}return;}}catch(e){}}
  if(submitBtn){submitBtn.disabled=false;submitBtn.textContent=editState?OFFER_AR.saveEdit:OFFER_AR.sendRequest;}
  if(!savedRemote){showOfferError(OFFER_AR.remoteFail);return;}
  const reviewMsg=(D.collab?.noticeAr||OFFER_AR.defaultReview);
  const state=parseOfferEditState();
  document.getElementById('offerSuccessStep').innerHTML='<div class="offer-success"><h4>'+(editState?OFFER_AR.savedTitle:OFFER_AR.receivedTitle)+'</h4><p>'+(editState?OFFER_AR.savedBody:OFFER_AR.thanks+reviewMsg)+'</p><div class="offer-ref">'+assignedRequestNo+'</div></div>';
  if(state){const box=document.querySelector('#offerSuccessStep .offer-success');const actions=document.createElement('div');actions.className='offer-success-actions';const editBtn=document.createElement('button');editBtn.className='offer-secondary-btn';editBtn.type='button';editBtn.textContent=OFFER_AR.editAction;editBtn.onclick=openOfferEditFromSuccess;const wait=document.createElement('span');wait.className='offer-edit-notice';wait.style.margin='0';wait.textContent=OFFER_AR.canSendAfter+offerRemainingText(state.editableUntil);actions.append(editBtn,wait);box?.append(actions);}
  showOfferStep('offerSuccessStep');
}

function queueClickTracking(id,url){
  const payload={link_id:id,device:/Mobi|Android/i.test(navigator.userAgent)?'mobile':'desktop'};
  Promise.resolve().then(async()=>{
    try{
      if(!sb)throw new Error('Supabase is not available');
      await sb.functions.invoke('public-events',{body:{type:'click',payload}});
    }catch(e){}
  });
}
function trackClick(id,url){
  if(url&&url.startsWith('http'))window.open(url,'_blank','noopener');
  queueClickTracking(id,url);
}
document.addEventListener('click',event=>{
  const link=event.target.closest('a[data-track-id]');
  if(link)queueClickTracking(link.dataset.trackId||'',link.href||'');
});

  document.getElementById('footerTxt').textContent=lang==='ar'?'© جميع الحقوق محفوظة':'© All rights reserved';
  document.getElementById('vLbl').textContent=lang==='ar'?'متواجد الآن':'online now';
}
